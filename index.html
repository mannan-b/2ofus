<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ws://chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #00ff87;
    --accent-dim: #00ff8722;
    --text: #e0e0e0;
    --text-dim: #555;
    --msg-in: #161616;
    --msg-out: #0d1f17;
    --red: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--text-dim); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    margin-left: auto;
    transition: background 0.3s;
    box-shadow: 0 0 0 0 var(--red);
    animation: pulse-red 2s infinite;
  }

  .status-dot.connected {
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: pulse-green 2s infinite;
  }

  @keyframes pulse-red {
    0%   { box-shadow: 0 0 0 0 rgba(255,68,68,0.6); }
    70%  { box-shadow: 0 0 0 6px rgba(255,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
  }

  @keyframes pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(0,255,135,0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(0,255,135,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,255,135,0); }
  }

  .status-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* ── Name bar ── */
  .namebar {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .session-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .namebar label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .namebar input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    padding: 2px 6px;
    width: 170px;
    outline: none;
    transition: border-color 0.2s;
  }

  .namebar input:focus { border-color: var(--accent); }

  .typing-indicator {
    min-height: 18px;
    padding: 0 24px 6px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 70%;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.self { align-self: flex-end; align-items: flex-end; }
  .msg.other { align-self: flex-start; align-items: flex-start; }
  .msg.system { align-self: center; align-items: center; max-width: 100%; }

  .msg-meta {
    font-size: 10px;
    color: var(--text-dim);
    padding: 0 6px;
    letter-spacing: 0.05em;
  }

  .msg-bubble {
    padding: 8px 14px;
    border-radius: 2px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg.self .msg-bubble {
    background: var(--msg-out);
    border: 1px solid #1a3d2a;
    border-right: 2px solid var(--accent);
    color: var(--text);
  }

  .msg.other .msg-bubble {
    background: var(--msg-in);
    border: 1px solid var(--border);
    border-left: 2px solid #333;
    color: var(--text);
  }

  .msg.system .msg-bubble {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 4px 12px;
  }

  /* ── Input area ── */
  .input-area {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .prompt {
    display: flex;
    align-items: center;
    padding: 0 16px;
    color: var(--accent);
    font-size: 15px;
    font-weight: 700;
    border-right: 1px solid var(--border);
    user-select: none;
  }

  #msgInput {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 16px;
    outline: none;
    caret-color: var(--accent);
  }

  #msgInput::placeholder { color: var(--text-dim); }

  #sendBtn {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 0 20px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.2s, background 0.2s;
  }

  #sendBtn:hover {
    color: var(--accent);
    background: var(--accent-dim);
  }

  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">ws<span>://</span>chat</div>
  <div class="status-label" id="statusLabel">DISCONNECTED</div>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="namebar">
  <div class="session-field">
    <label for="nameInput">YOUR ID</label>
    <input type="text" id="nameInput" placeholder="anonymous" maxlength="20" />
  </div>
  <div class="session-field">
    <label for="recipientInput">CHAT WITH</label>
    <input type="text" id="recipientInput" placeholder="recipient id" maxlength="20" />
  </div>
  <button id="connectBtn">CONNECT</button>
</div>

<div id="messages"></div>
<div id="typingIndicator" class="typing-indicator" aria-live="polite"></div>

<div class="input-area">
  <div class="prompt">&gt;</div>
  <input type="text" id="msgInput" placeholder="type a message..." maxlength="256" />
  <button id="sendBtn" disabled>SEND</button>
</div>

<script>
  const sentMessages = {};
  const messagesEl = document.getElementById('messages');
  const typingIndicator = document.getElementById('typingIndicator');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const connectBtn = document.getElementById('connectBtn');
  const nameInput = document.getElementById('nameInput');
  const recipientInput = document.getElementById('recipientInput');
  const statusDot = document.getElementById('statusDot');
  const statusLabel = document.getElementById('statusLabel');

  let ws = null;
  let typingTimeout = null;
  let currentRecipient = '';

  function getName() {
    return nameInput.value.trim() || 'anonymous';
  }

  function addMessage(text, type = 'other', sender = '', mid = null) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${type}`;

    if (type !== 'system' && sender) {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      meta.innerHTML = `
        ${sender} · ${time}
        ${type === 'self' ? `<span id="tick-${mid}" style="color:#8ee5ff">✓</span>` : ''}
      `;
      wrapper.appendChild(meta);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);

    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setConnected(connected) {
    statusDot.className = 'status-dot' + (connected ? ' connected' : '');
    statusLabel.textContent = connected ? 'CONNECTED' : 'DISCONNECTED';
    sendBtn.disabled = !connected;
    msgInput.disabled = !connected;
    connectBtn.textContent = connected ? 'RECONNECT' : 'CONNECT';
  }

  function clearTypingIndicator() {
    typingIndicator.textContent = '';
  }

  function showTypingIndicator(name) {
    typingIndicator.textContent = `${name} is typing...`;
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(clearTypingIndicator, 900);
  }

  function handleChat(data) {
    addMessage(data.msg, 'other', data.from, data.id);
  }

  function handleAck(data) {
    const tick = document.getElementById(`tick-${data.id || data.mid}`);
    if (tick) {
      tick.textContent = '✓✓';
      tick.style.color = '#4dd0ff';
    }
  }

  function handleSeen(data) {
    const tick = document.getElementById(`tick-${data.mid}`);
    if (tick) {
      tick.textContent = '✓✓';
      tick.style.color = '#38bdf8';
    }
  }

  function handleTyping(data) {
    if (!data || !data.from || data.from === getName()) return;
    showTypingIndicator(data.from);
  }

  function connect() {
    const userId = getName();
    const recipient = recipientInput.value.trim();

    if (!userId) {
      alert('Enter your ID before connecting.');
      return;
    }

    if (!recipient) {
      alert('Enter the recipient ID before connecting.');
      return;
    }

    currentRecipient = recipient;

    if (ws) {
      ws.close();
    }

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.hostname}:8080/ws?uid=${encodeURIComponent(userId)}`);

    ws.onopen = () => {
      setConnected(true);
      addMessage(`Connected as ${userId}. Chatting with ${currentRecipient}.`, 'system');
      clearTypingIndicator();
    };

    ws.onclose = () => {
      setConnected(false);
      addMessage('Disconnected. Click CONNECT to start a new chat session.', 'system');
      ws = null;
    };

    ws.onerror = () => {
      addMessage('Connection error.', 'system');
    };

    ws.onmessage = (event) => {
      const packet = JSON.parse(event.data);

      if (packet.t === 'chat') {
        handleChat(packet.d);
        return;
      }

      if (packet.t === 'ack') {
        handleAck(packet.d);
        return;
      }

      if (packet.t === 'seen') {
        handleSeen(packet.d);
        return;
      }

      if (packet.t === 'typing') {
        handleTyping(packet.d);
      }
    };
  }

  function sendTypingEvent() {
    if (!ws || !currentRecipient) return;

    ws.send(JSON.stringify({
      t: 'typing',
      d: { to: currentRecipient }
    }));

    showTypingIndicator('You');
  }

  function sendMessage() {
    const text = msgInput.value.trim();

    if (!text || !ws || !currentRecipient) {
      if (!currentRecipient) {
        alert('Select a recipient before sending.');
      }
      return;
    }

    const mid = crypto.randomUUID();

    ws.send(JSON.stringify({
      t: 'chat',
      d: {
        id: mid,
        to: currentRecipient,
        msg: text
      }
    }));

    addMessage(text, 'self', getName(), mid);
    sentMessages[mid] = true;
    msgInput.value = '';
  }

  connectBtn.addEventListener('click', () => {
    connect();
  });

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      sendMessage();
    }
  });

  msgInput.addEventListener('input', () => {
    if (!ws || !currentRecipient) return;
    sendTypingEvent();
  });

  setConnected(false);
</script>
</body>
</html>
